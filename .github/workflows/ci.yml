name: CI

on:
  push:
    branches: [main, feature/**]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository_owner }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Server tests
  # ─────────────────────────────────────────────────────────────────────────
  test-server:
    name: Server tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # ─────────────────────────────────────────────────────────────────────────
  # Client tests + build verification
  # ─────────────────────────────────────────────────────────────────────────
  test-client:
    name: Client tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:run

      - name: Build (verify no type/bundle errors)
        run: npm run build

  # ─────────────────────────────────────────────────────────────────────────
  # Docker — build & push to GHCR
  # Only runs on main branch pushes and version tags.
  # On PRs, images are built but not pushed (smoke test).
  # ─────────────────────────────────────────────────────────────────────────
  docker:
    name: Docker (${{ matrix.image }})
    runs-on: ubuntu-latest
    needs: [test-server, test-client]

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - image: congruity-signaling
            context: server
            dockerfile: server/Dockerfile
          - image: congruity-web
            context: client
            dockerfile: client/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────
  # Summary — single required status check for branch protection
  # ─────────────────────────────────────────────────────────────────────────
  ci-pass:
    name: CI passed
    runs-on: ubuntu-latest
    needs: [test-server, test-client, docker]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.test-server.result }}" != "success" || \
                "${{ needs.test-client.result }}" != "success" || \
                "${{ needs.docker.result }}" != "success" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All jobs passed"
